name: 6-Hourly Sentiment Report

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python3 -c "
          import nltk
          nltk.download('averaged_perceptron_tagger_eng', quiet=True)
          nltk.download('punkt_tab', quiet=True)
          "

      - name: Generate report
        run: |
          python3 -c "
          from report_generator import generate_report
          r = generate_report(hours=24)
          print(f'Done: {r[\"stats\"][\"total_news\"]} news, '
                f'{r[\"stats\"][\"total_tweets\"]} tweets, '
                f'{r[\"stats\"].get(\"total_tw_mentions\",0)} X mentions, '
                f'{r[\"stats\"].get(\"total_li_mentions\",0)} LI mentions')
          "

      - name: Commit updated data back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 6-hourly report refresh [skip ci]"
          file_pattern: |
            data/reports/latest.json
            data/reports/report_*.json
            data/seen_articles.json
            data/follower_history.json
